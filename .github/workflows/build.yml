# GitHub Actions: Build .py → .exe via PyInstaller
name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl et_xmlfile pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          $files = Get-ChildItem "$env:GITHUB_WORKSPACE" -Filter *.py -Recurse `
            | Where-Object { $_.Name -ne "setup.py" -and $_.Name -ne "gen_spec.py" }
          foreach ($f in $files) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name)
            $specPath = "$env:RUNNER_TEMP\${name}.spec"
            python "$env:GITHUB_WORKSPACE\gen_spec.py" $f.FullName $name $specPath 2>&1
            if ($LASTEXITCODE -ne 0) { exit 1 }
            pyinstaller $specPath 2>&1
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-exe
          path: dist\*.exe
          if-no-files-found: error
